; ── Polybar config mẫu cho LTWM ────────────────────────────────────────────
; Copy vào ~/.config/polybar/config.ini và chỉnh theo ý muốn.
;
; Workspace integration: ltwm push THẲNG vào Polybar IPC pipe.
; Không cần ltwm-workspaces.sh hay script polling nào cả — 0 lag.
;
; Cách hoạt động:
;   ltwmrc: ltwmc config polybar_pipe "/tmp/polybar_ltwm_ws.pipe"
;   Mỗi khi switch workspace / mở / đóng window → ltwm tự push vào pipe
;   Polybar nhận ngay lập tức qua module custom/ipc
;
; Yêu cầu: polybar >= 3.5 (hỗ trợ custom/ipc)
; Font: IosevkaNerdFont hoặc bất kỳ Nerd Font nào để hiển thị icon đúng

[colors]
bg         = #d912191b
fg         = #cdd6f4
active-fg  = #547985
active-bg  = #d912191b
occupied-fg= #6b8e98
occupied-bg= #d912191b
alert      = #f38ba8

[bar/ltwm]
; ── geometry ────────────────────────────────────────────────
width   = 100%
height  = 28
offset-x = 0
offset-y = 0
radius  = 0

; ── màu nền / viền ──────────────────────────────────────────
background = ${colors.bg}
foreground = ${colors.fg}
border-size = 0

; ── font ────────────────────────────────────────────────────
; font-0: text chính (IosevkaNerdFont hỗ trợ icon Nerd Fonts)
; font-1: fallback Unicode
font-0 = IosevkaNerdFont:size=14;3
font-1 = Noto Sans:size=11;2

; ── modules ─────────────────────────────────────────────────
modules-left   = ltwm-workspaces ltwm-layout
modules-center = ltwm-title
modules-right  = date cpu memory

; ── IPC: cho phép Polybar nhận push từ ltwm ─────────────────
enable-ipc = true

; Pipe path phải KHỚP với ltwmrc: ltwmc config polybar_pipe "..."
; Polybar tự tạo pipe này khi khởi động, ltwm ghi vào đó.
ipc-pid-file = /tmp/polybar_ltwm.pid

; ── misc ────────────────────────────────────────────────────
padding-left  = 1
padding-right = 2
module-margin = 1
separator     = " "
cursor-click  = pointer
wm-restack    = generic

; ── tray ────────────────────────────────────────────────────
tray-position = right
tray-padding  = 4

; ════════════════════════════════════════════════════════════
; MODULES
; ════════════════════════════════════════════════════════════

[module/ltwm-workspaces]
; ltwm push thẳng vào đây — không script, không polling
type     = custom/ipc
; hook-0: query lần đầu khi polybar start
hook-0   = ltwmc bar_workspaces
; initial = 1 → chạy hook-0 ngay khi polybar khởi động
initial  = 1
; Sau đó ltwm tự push mỗi khi có thay đổi — 0 can thiệp thêm

[module/ltwm-layout]
type     = custom/script
exec     = ltwmc getstatus | grep -o '"layout":"[^"]*"' | grep -o '[^"]*$'
interval = 0
; re-render khi nhận signal SIGUSR1 — hook vào ltwm event nếu muốn

[module/ltwm-title]
type      = custom/script
exec      = ltwmc getstatus | python3 -c "import sys,json; d=json.load(sys.stdin); f=d.get('focused'); print(f['title'] if f else '')" 2>/dev/null
interval  = 1
format-foreground = ${colors.fg}
label-maxlen = 60

[module/date]
type     = internal/date
interval = 1
date     = %Y-%m-%d
time     = %H:%M:%S
label    = " %date%  %time%"
label-foreground = ${colors.fg}

[module/cpu]
type             = internal/cpu
interval         = 2
format-prefix    = " "
label            = %percentage:2%%

[module/memory]
type             = internal/memory
interval         = 2
format-prefix    = " "
label            = %percentage_used:2%%
