; ── pywal colors ─────────────────────────────────────────────
[colors]
include-file = ~/.cache/wal/colors-polybar

; ── bar ──────────────────────────────────────────────────────
[bar/ltwm]
width            = 100%
height           = 28
radius           = 0
fixed-center     = true

background       = ${colors.background}
foreground       = ${colors.foreground}

line-size        = 2
padding-left     = 1
padding-right    = 1
module-margin    = 0

font-0           = JetBrainsMono Nerd Font:style=Regular:size=11;3
font-1           = JetBrainsMono Nerd Font:style=Regular:size=9;2

modules-left     = ltwm-workspaces
modules-center   = ltwm-window
modules-right    = pulseaudio network battery date

wm-restack       = generic
override-redirect = true
cursor-click     = pointer
cursor-scroll    = ns-resize
tray-position    = right
tray-padding     = 4

; ── workspaces ───────────────────────────────────────────────
[module/ltwm-workspaces]
type             = custom/script
exec             = ~/.config/ltwm/ltwm-workspaces.sh
tail             = true
interval         = 0
label            = %output%

; ── active window title ──────────────────────────────────────
[module/ltwm-window]
type             = custom/script
exec             = while true; do t=$(ltwmc getstatus 2>/dev/null | grep -o '"title":"[^"]*"' | sed 's/"title":"//;s/"//g'); echo "${t:-}"; sleep 0.4; done
tail             = true
interval         = 0
label            = %output:0:60%
format-padding   = 2

; ── pulseaudio ───────────────────────────────────────────────
[module/pulseaudio]
type                        = internal/pulseaudio
format-volume               = <ramp-volume> <label-volume>
label-volume                = %percentage%%
label-muted                 =  muted
label-muted-foreground      = ${colors.disabled}
ramp-volume-0               = 
ramp-volume-1               = 
ramp-volume-2               = 
ramp-volume-foreground      = ${colors.primary}
click-right                 = pavucontrol &
format-volume-padding        = 1
format-muted-padding         = 1

; ── network ──────────────────────────────────────────────────
[module/network]
type                        = internal/network
interface-type              = wireless
interval                    = 3
format-connected            = <label-connected>
label-connected             =  %essid% %local_ip%
label-connected-foreground  = ${colors.secondary}
format-disconnected         = <label-disconnected>
label-disconnected          =  --
label-disconnected-foreground = ${colors.disabled}
format-connected-padding    = 1
format-disconnected-padding = 1

; ── battery ──────────────────────────────────────────────────
[module/battery]
type                        = internal/battery
battery                     = BAT0
adapter                     = AC
full-at                     = 98
poll-interval               = 10
format-charging             = <animation-charging> <label-charging>
format-discharging          = <ramp-capacity> <label-discharging>
format-full                 =  <label-full>
label-charging              = %percentage%%
label-discharging           = %percentage%%
label-full                  = Full
ramp-capacity-0             = 
ramp-capacity-1             = 
ramp-capacity-2             = 
ramp-capacity-3             = 
ramp-capacity-4             = 
ramp-capacity-foreground    = ${colors.primary}
animation-charging-0        = 
animation-charging-1        = 
animation-charging-2        = 
animation-charging-3        = 
animation-charging-4        = 
animation-charging-foreground = ${colors.primary}
animation-charging-framerate  = 750
format-charging-padding     = 1
format-discharging-padding  = 1
format-full-padding         = 1

; ── clock ────────────────────────────────────────────────────
[module/date]
type             = internal/date
interval         = 30
date             = %a %d/%m
time             = %H:%M
label            =  %date%  %time%
format-padding   = 1
