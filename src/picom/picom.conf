# ── backend ──────────────────────────────────────────────────
backend     = "glx";
vsync       = true;
glx-no-stencil = true;

# ── corners ──────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── shadows ──────────────────────────────────────────────────
shadow          = true;
shadow-radius   = 12;
shadow-opacity  = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude  = [
    "window_type = 'dock'",
    "window_type = 'tooltip'",
    "window_type = 'notification'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# ── fading ───────────────────────────────────────────────────
fading       = true;
fade-in-step  = 0.06;
fade-out-step = 0.06;
fade-delta    = 8;
fade-exclude  = [
    "window_type = 'dock'"
];

# ── opacity ──────────────────────────────────────────────────
inactive-opacity          = 0.92;
active-opacity            = 1.0;
frame-opacity             = 1.0;
inactive-opacity-override = false;
focus-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── misc ─────────────────────────────────────────────────────
mark-wmwin-focused      = true;
mark-ovredir-focused    = true;
detect-rounded-corners  = true;
detect-client-opacity   = true;
detect-transient        = true;
use-ewmh-active-win     = true;
