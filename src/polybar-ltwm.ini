; ─── thêm vào config.ini của polybar ────────────────────────
; hoặc [include-file = ~/.config/ltwm/polybar-ltwm.ini]

[module/ltwm-workspaces]
type             = custom/script
exec             = ~/.config/ltwm/ltwm-workspaces.sh
tail             = true
interval         = 0

; click chuột trái để switch workspace
click-left       = ltwmc workspace $(echo %output% | grep -o '[0-9]*' | head -1)

label            = %output%
format           = <label>
format-padding   = 0

[module/ltwm-window]
type             = custom/script
exec             = while true; do ltwmc getstatus 2>/dev/null | grep -o '"title":"[^"]*"' | sed 's/"title":"//;s/"//g'; sleep 0.5; done
tail             = true
interval         = 0
label            = %output:0:60%
format-padding   = 1
